name: pillpal
description: "Medical Intelligence Assistant for Prescription Interpretation and Medication Adherence Support System"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter_svg: ^2.2.3
  gradient_elevated_button: ^1.1.0

  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/app_icon/mia_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon/mia_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - .env

fonts:
    - family: TestDomain 
      fonts:
        - assets: assets/fonts/DomainDisplay-Regular.otf
        - assets: assets/fonts/DomainDisplay-Medium.otf
        - assets: assets/fonts/DomainDisplay-Semibold.otf
        - assets: assets/fonts/DomainDisplay-Bold.otf
        - assets: assets/fonts/DomainDisplay-Extrabold.otf